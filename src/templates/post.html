<article class="post-container">
    <div class="post-navigation">
        <a href="/" class="back-link">
            <span class="nav-arrow">←</span>
            <span>Back to posts</span>
        </a>
        <div class="post-actions">
            <a href="{{url}}" class="source-link" target="_blank" rel="noopener noreferrer">
                <span class="action-icon"><svg class="nav-icon" width="14" height="14" aria-hidden="true"><use href="#icon-github"/></svg></span>
                <span>View source</span>
            </a>
        </div>
    </div>

    <header class="post-header-compact">
        <div class="post-meta-line">
            <time datetime="{{createdAt}}" class="post-date">{{formattedDate}} · {{readingTime}} read</time>
        </div>
        <h1 class="post-title-compact">{{title}}</h1>
    </header>

    <div class="post-content-wrapper">
        {{#hasToc}}
        <div class="toc-sidebar">
            <div class="graph-terminal" id="topic-graph-terminal">
                <div class="terminal-header-small">
                    <div class="terminal-title-small">Topics</div>
                </div>
                <div class="graph-content" data-current-topic="{{currentTopic}}" data-all-topics="{{tagsCsv}}">
                    <button class="graph-reset-btn" data-target="topic-graph" title="Reset view">reset</button>
                    <svg id="topic-graph" class="graph-svg" viewBox="0 0 220 232" width="220" height="232"
                        aria-label="Topic graph"></svg>
                </div>
            </div>
            <div class="toc-terminal">
                <div class="terminal-header-small">
                    <div class="terminal-title-small">Contents</div>
                </div>
                <div class="toc-content">
                    <nav class="table-of-contents">
                        {{#toc}}
                        <div class="toc-item toc-level-{{level}}">
                            <span class="toc-line-number">{{lineNumber}}</span>
                            <a href="#{{anchor}}" class="toc-link">{{title}}</a>
                        </div>
                        {{/toc}}
                    </nav>
                </div>
            </div>
        </div>
        {{/hasToc}}
        <div class="content-terminal">
            <div class="terminal-header-small">
                <div class="terminal-title-small">{{filename}}</div>
            </div>
            <div class="post-content-advanced">
                {{htmlContent}}
            </div>
        </div>
    </div>
</article>
